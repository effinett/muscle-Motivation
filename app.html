<!DOCTYPE html>
<html>
<head>
  <title>Muscle Motivation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: black;
      color: white;
      margin: 0;
    }
    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: red;
    }
    .card {
      background: #111;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
    }
    button {
      background: red;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      border-radius: 5px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #222;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<header>Muscle Motivation</header>

<div class="card">
  <h2>Daily Targets</h2>
  <p>Calories: 2,400</p>
  <p>Protein: 180g</p>
</div>

<div class="card">
  <h2>Log Meal</h2>
  <input placeholder="Enter food or upload soon...">
  <button onclick="alert('Meal Logged!')">Log</button>
</div>

<div class="card">
  <h2>Workout</h2>
  <p>Full Body Workout A</p>
  <button>Start Workout</button>
</div>

<div class="card">
  <h2>Habits</h2>
  <p>Water: 3 / 8 cups</p>
  <p>Steps: 4,200</p>
</div>

</body>
</html>
